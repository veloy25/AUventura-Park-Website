version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: auventura-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auventura
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - microservices

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      DEPOIMENTOS_SERVICE_URL: http://depoimentos-service:3002
      SCHEDULING_SERVICE_URL: http://agendamentos-service:3003
    depends_on:
      - user-service
      - depoimentos-service
      - agendamentos-service
    networks:
      - microservices

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      USER_SERVICE_PORT: 3001
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: auventura
      DB_PORT: 3306
      JWT_SECRET: super_secret_login_key
      JWT_EXPIRATION: 2h
    depends_on:
      - mysql
    networks:
      - microservices

  depoimentos-service:
    build:
      context: ./services/depoimentos-service
    container_name: depoimentos-service
    ports:
      - "3002:3002"
    environment:
      TESTIMONIALS_SERVICE_PORT: 3002
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: auventura
      DB_PORT: 3306
      JWT_SECRET: super_secret_login_key
      JWT_EXPIRATION: 2h
    depends_on:
      - mysql
    networks:
      - microservices

  agendamentos-service:
    build:
      context: ./services/agendamentos-service
    container_name: agendamentos-service
    ports:
      - "3003:3003"
    environment:
      SCHEDULING_SERVICE_PORT: 3003
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: auventura
      DB_PORT: 3306
      JWT_SECRET: super_secret_login_key
      JWT_EXPIRATION: 2h
    depends_on:
      - mysql
    networks:
      - microservices

  notificacoes-service:
    build:
      context: ./services/notificacoes-service
    container_name: notificacoes-service
    ports:
      - "3007:3007"
    environment:
      NOTIFICACOES_SERVICE_PORT: 3007
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: auventura
      DB_PORT: 3306
      JWT_SECRET: super_secret_login_key
      JWT_EXPIRATION: 2h
    depends_on:
      - mysql
    networks:
      - microservices

volumes:
  mysql-data:

networks:
  microservices:
    driver: bridge
